name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm_deploy:
        description: "Type 'deploy' to confirm"
        required: true
        type: string

permissions:
  contents: read

jobs:
  confirm:
    name: Confirm Intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: inputs.confirm_deploy != 'deploy'
        run: |
          echo "Deployment not confirmed. You must type 'deploy' to proceed."
          exit 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: confirm

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tabletalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx vitest run --reporter=verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test
          JWT_SECRET: test-secret-key
          STAFF_JWT_SECRET: test-staff-secret-key

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Staging
        run: railway up --service tabletalk-be
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Successful"
          echo "- **Branch:** ${{ github.ref_name }}"
          echo "- **Commit:** ${{ github.sha }}"
          echo "- **Triggered by:** ${{ github.actor }}"
          echo "- **Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Production
        run: railway up --service tabletalk-be
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## Production Deployment Successful"
          echo "- **Branch:** ${{ github.ref_name }}"
          echo "- **Commit:** ${{ github.sha }}"
          echo "- **Triggered by:** ${{ github.actor }}"
          echo "- **Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
