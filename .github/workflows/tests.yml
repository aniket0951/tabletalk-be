name: carplus tests

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]
  workflow_dispatch:
    inputs:
      triggered_by_coverage_service:
        description: "Triggered by global coverage service"
        required: false
        default: "false"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tabletalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Tests with Coverage
        run: |
          npx vitest run --coverage --reporter=verbose 2>&1 | tee test-results.txt
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test
          JWT_SECRET: test-secret-key
          STAFF_JWT_SECRET: test-staff-secret-key

      - name: Parse Test Results
        id: summary
        if: always()
        run: |
          # Extract pass/fail counts from vitest output
          passed=$(grep -oP 'Tests\s+\K\d+(?=\s+passed)' test-results.txt || echo "0")
          failed=$(grep -oP 'Tests\s+\K\d+(?=\s+failed)' test-results.txt || echo "0")
          total=$((passed + failed))

          if [ "$total" -eq 0 ]; then
            passed=$(grep -c "✓\|✔\|PASS" test-results.txt || echo "0")
            failed=$(grep -c "✗\|✘\|FAIL" test-results.txt || echo "0")
            total=$((passed + failed))
          fi

          # Extract coverage from json-summary
          if [ -f coverage/coverage-summary.json ]; then
            statement_coverage=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.statements.pct)")
            branch_coverage=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.branches.pct)")
            function_coverage=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.functions.pct)")
            line_coverage=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")

            overall_coverage=$(node -e "
              const c=require('./coverage/coverage-summary.json').total;
              const avg=((c.statements.pct*0.4)+(c.branches.pct*0.25)+(c.functions.pct*0.2)+(c.lines.pct*0.15)).toFixed(1);
              console.log(avg)
            ")
          else
            statement_coverage="0"
            branch_coverage="0"
            function_coverage="0"
            line_coverage="0"
            overall_coverage="0"
          fi

          # Build coverage JSON for global service
          cat > coverage.json << EOF
          {
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "total_coverage": $overall_coverage,
            "statement_coverage": $statement_coverage,
            "function_coverage": $function_coverage,
            "branch_coverage": $branch_coverage,
            "line_coverage": $line_coverage,
            "coverage_type": "nodejs",
            "workflow_run_id": "${{ github.run_id }}",
            "test_results": {
              "total_tests": $total,
              "passed_tests": $passed,
              "failed_tests": $failed,
              "success_rate": $(node -e "console.log($total>0?($passed*100/$total).toFixed(2):0)")
            }
          }
          EOF

          echo "Generated coverage.json:"
          cat coverage.json

          # Extract failed test names for PR comment
          if [ "$failed" -gt 0 ]; then
            failed_list=$(grep -E "FAIL|✗|✘" test-results.txt | grep -v "Test Files" | head -20 | sed 's/^/- `/' | sed 's/$/`/')
            echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
            echo "$failed_list" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "failed_tests=None" >> $GITHUB_OUTPUT
          fi

          echo "summary=✅ $passed passed, ❌ $failed failed, 🔢 $total total" >> $GITHUB_OUTPUT
          echo "function_coverage=📊 Function Coverage: ${function_coverage}%" >> $GITHUB_OUTPUT
          echo "statement_coverage=📊 Statement Coverage: ${statement_coverage}%" >> $GITHUB_OUTPUT
          echo "branch_coverage=🌿 Branch Coverage: ${branch_coverage}%" >> $GITHUB_OUTPUT
          echo "line_coverage=🛤️ Line Coverage: ${line_coverage}%" >> $GITHUB_OUTPUT
          echo "overall_coverage=🎯 Overall Coverage: ${overall_coverage}%" >> $GITHUB_OUTPUT

      - name: List Failed Test Cases
        if: always()
        run: |
          echo "## Failed Test Cases"
          if grep -qE "FAIL|✗|✘" test-results.txt && ! grep -q "0 failed" test-results.txt; then
            echo ""
            echo "| # | Test Name |"
            echo "|---|-----------|"
            grep -E "FAIL|✗|✘" test-results.txt | grep -v "Test Files" | head -20 | awk '{count++; printf "| %d | %s |\n", count, $0}'
            echo ""
            echo "### Failure Details:"
            echo '```'
            grep -B 3 -A 3 -E "FAIL|✗|✘|AssertionError|Error:" test-results.txt | head -50 || true
            echo '```'
          else
            echo "All test cases passed!"
          fi

      - name: Comment on PR with Test Summary and Coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-summary
          message: |
            ## 🧪 Test Results Summary
            ${{ steps.summary.outputs.summary }}

            ## 📊 Code Coverage
            **${{ steps.summary.outputs.overall_coverage }}**

            **Breakdown:**
            ${{ steps.summary.outputs.function_coverage }}
            ${{ steps.summary.outputs.statement_coverage }}
            ${{ steps.summary.outputs.branch_coverage }}
            ${{ steps.summary.outputs.line_coverage }}

            ## ❌ Failed Tests
            ${{ steps.summary.outputs.failed_tests }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage/
            test-results.txt
          retention-days: 30

