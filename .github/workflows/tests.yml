name: carplus tests

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]
  workflow_dispatch:
    inputs:
      triggered_by_coverage_service:
        description: "Triggered by global coverage service"
        required: false
        default: "false"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tabletalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Tests with Coverage
        run: |
          npx vitest run --coverage --reporter=verbose 2>&1 | tee test-results.txt
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tabletalk_test
          JWT_SECRET: test-secret-key
          STAFF_JWT_SECRET: test-staff-secret-key

      - name: Parse Test Results
        id: summary
        if: always()
        run: |
          # Use node to parse vitest output reliably (avoids grep multiline issues)
          node -e "
            const fs = require('fs');
            const txt = fs.readFileSync('test-results.txt', 'utf8');

            // Vitest summary line: 'Tests  166 passed (166)' or 'Tests  2 failed | 164 passed (166)'
            const passMatch = txt.match(/(\d+)\s+passed/);
            const failMatch = txt.match(/(\d+)\s+failed/);
            const passed = passMatch ? parseInt(passMatch[1]) : 0;
            const failed = failMatch ? parseInt(failMatch[1]) : 0;
            const total = passed + failed;

            let coverage = { statement: 0, branch: 0, function: 0, line: 0, overall: 0 };
            try {
              const c = require('./coverage/coverage-summary.json').total;
              coverage.statement = c.statements.pct;
              coverage.branch = c.branches.pct;
              coverage.function = c.functions.pct;
              coverage.line = c.lines.pct;
              coverage.overall = Number(((c.statements.pct * 0.4) + (c.branches.pct * 0.25) + (c.functions.pct * 0.2) + (c.lines.pct * 0.15)).toFixed(1));
            } catch {}

            const successRate = total > 0 ? Number(((passed * 100) / total).toFixed(2)) : 0;

            // Write coverage.json
            const report = {
              repository: process.env.GITHUB_REPOSITORY,
              branch: process.env.GITHUB_REF_NAME,
              commit_sha: process.env.GITHUB_SHA,
              timestamp: new Date().toISOString(),
              total_coverage: coverage.overall,
              statement_coverage: coverage.statement,
              function_coverage: coverage.function,
              branch_coverage: coverage.branch,
              line_coverage: coverage.line,
              coverage_type: 'nodejs',
              workflow_run_id: process.env.GITHUB_RUN_ID,
              test_results: { total_tests: total, passed_tests: passed, failed_tests: failed, success_rate: successRate }
            };
            fs.writeFileSync('coverage.json', JSON.stringify(report, null, 2));
            console.log('Generated coverage.json:');
            console.log(JSON.stringify(report, null, 2));

            // Write GITHUB_OUTPUT
            const out = fs.openSync(process.env.GITHUB_OUTPUT, 'a');
            const write = (k, v) => fs.writeSync(out, k + '=' + v + '\n');
            write('passed', passed);
            write('failed', failed);
            write('total', total);
            write('summary', '✅ ' + passed + ' passed, ❌ ' + failed + ' failed, 🔢 ' + total + ' total');
            write('function_coverage', '📊 Function Coverage: ' + coverage.function + '%');
            write('statement_coverage', '📊 Statement Coverage: ' + coverage.statement + '%');
            write('branch_coverage', '🌿 Branch Coverage: ' + coverage.branch + '%');
            write('line_coverage', '🛤️ Line Coverage: ' + coverage.line + '%');
            write('overall_coverage', '🎯 Overall Coverage: ' + coverage.overall + '%');

            if (failed > 0) {
              const failedLines = txt.split('\n').filter(l => /FAIL|✗|✘/.test(l) && !/Test Files/.test(l)).slice(0, 20).map(l => '- \`' + l.trim() + '\`').join('\n');
              fs.writeSync(out, 'failed_tests<<ENDOFTESTS\n' + failedLines + '\nENDOFTESTS\n');
            } else {
              write('failed_tests', 'None');
            }
            fs.closeSync(out);
          "
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: List Failed Test Cases
        if: always()
        run: |
          echo "## Failed Test Cases"
          if grep -qE "FAIL|✗|✘" test-results.txt && ! grep -q "0 failed" test-results.txt; then
            echo ""
            echo "| # | Test Name |"
            echo "|---|-----------|"
            grep -E "FAIL|✗|✘" test-results.txt | grep -v "Test Files" | head -20 | awk '{count++; printf "| %d | %s |\n", count, $0}'
            echo ""
            echo "### Failure Details:"
            echo '```'
            grep -B 3 -A 3 -E "FAIL|✗|✘|AssertionError|Error:" test-results.txt | head -50 || true
            echo '```'
          else
            echo "All test cases passed!"
          fi

      - name: Comment on PR with Test Summary and Coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-summary
          message: |
            ## 🧪 Test Results Summary
            ${{ steps.summary.outputs.summary }}

            ## 📊 Code Coverage
            **${{ steps.summary.outputs.overall_coverage }}**

            **Breakdown:**
            ${{ steps.summary.outputs.function_coverage }}
            ${{ steps.summary.outputs.statement_coverage }}
            ${{ steps.summary.outputs.branch_coverage }}
            ${{ steps.summary.outputs.line_coverage }}

            ## ❌ Failed Tests
            ${{ steps.summary.outputs.failed_tests }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage/
            test-results.txt
          retention-days: 30

